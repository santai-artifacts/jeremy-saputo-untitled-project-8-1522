<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Earth</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000000;
            min-height: 100vh;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }

        #stars {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        #canvas {
            display: block;
            position: relative;
            z-index: 1;
        }

        h1 {
            position: fixed;
            top: 40px;
            left: 50%;
            transform: translateX(-50%);
            color: #ff69b4;
            z-index: 2;
            font-size: 32px;
        }

        .controls {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            color: #ff69b4;
            text-align: center;
            font-size: 14px;
            z-index: 2;
        }
    </style>
</head>
<body>
    <svg id="stars" xmlns="http://www.w3.org/2000/svg"></svg>
    <h1>Hello World</h1>
    <canvas id="canvas"></canvas>
    <div class="controls">
        <p>Drag to rotate the globe</p>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // Create stars
        const svg = document.getElementById('stars');
        const w = window.innerWidth, h = window.innerHeight;
        svg.setAttribute('viewBox', `0 0 ${w} ${h}`);
        for (let i = 0; i < 200; i++) {
            const x = Math.random() * w;
            const y = Math.random() * h;
            const r = Math.random() * 1.2 + 0.3;
            const op = (Math.random() * 0.6 + 0.3).toFixed(2);
            const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
            circle.setAttribute('cx', x);
            circle.setAttribute('cy', y);
            circle.setAttribute('r', r);
            circle.setAttribute('fill', 'white');
            circle.setAttribute('opacity', op);
            svg.appendChild(circle);
        }

        // Three.js setup
        const canvas = document.getElementById('canvas');
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setClearColor(0x000000);
        camera.position.z = 2.5;

        // Create canvas texture for Earth
        const textureCanvas = document.createElement('canvas');
        textureCanvas.width = 2048;
        textureCanvas.height = 1024;
        const ctx = textureCanvas.getContext('2d');

        // Draw ocean
        ctx.fillStyle = '#1e90ff';
        ctx.fillRect(0, 0, textureCanvas.width, textureCanvas.height);

        // Draw continents
        ctx.fillStyle = '#2ecc71';

        // Helper to draw continent
        function drawContinent(startX, startY, points) {
            ctx.beginPath();
            ctx.moveTo(startX + points[0][0], startY + points[0][1]);
            for (let i = 1; i < points.length; i++) {
                ctx.lineTo(startX + points[i][0], startY + points[i][1]);
            }
            ctx.closePath();
            ctx.fill();
        }

        // North America
        drawContinent(100, 300, [[0, 0], [40, -30], [80, -20], [100, 20], [80, 80], [40, 70], [20, 50]]);
        drawContinent(120, 250, [[0, 0], [30, -20], [35, 20], [20, 30]]);

        // South America
        drawContinent(150, 480, [[0, 0], [40, -20], [50, 20], [45, 120], [20, 140], [0, 100]]);

        // Europe/Africa
        drawContinent(400, 280, [[0, 0], [60, -40], [80, 20], [70, 100], [40, 140], [20, 100], [10, 50]]);
        drawContinent(420, 250, [[0, 0], [40, -30], [45, 10], [35, 30]]);

        // Asia
        drawContinent(550, 200, [[0, 0], [150, -50], [200, 50], [150, 150], [80, 140], [50, 80]]);

        // India
        drawContinent(680, 320, [[0, 0], [30, -10], [35, 50], [15, 60]]);

        // Southeast Asia
        drawContinent(750, 340, [[0, 0], [50, -20], [60, 40], [30, 50]]);

        // Australia
        drawContinent(850, 420, [[0, 0], [60, -40], [75, 20], [70, 100], [40, 110], [10, 70]]);
        drawContinent(920, 380, [[0, 0], [15, -15], [18, 30], [10, 40]]);

        // Back side (Pacific/Asia eastern)
        drawContinent(1400, 280, [[0, 0], [40, -30], [50, 20], [40, 50]]);
        drawContinent(1550, 240, [[0, 0], [80, -40], [100, 40], [70, 100]]);

        // Antarctica hint
        ctx.fillStyle = '#e8e8e8';
        ctx.globalAlpha = 0.6;
        drawContinent(400, 850, [[0, 0], [150, -30], [250, -20], [300, 30], [200, 80], [50, 70]]);
        ctx.globalAlpha = 1;

        const texture = new THREE.CanvasTexture(textureCanvas);
        const geometry = new THREE.SphereGeometry(1, 64, 64);
        const material = new THREE.MeshPhongMaterial({ map: texture });
        const globe = new THREE.Mesh(geometry, material);
        scene.add(globe);

        // Lighting
        const light1 = new THREE.DirectionalLight(0xffffff, 0.8);
        light1.position.set(5, 3, 5);
        scene.add(light1);

        const light2 = new THREE.AmbientLight(0xffffff, 0.4);
        scene.add(light2);

        // Interaction
        let isDragging = false;
        let lastX = 0;
        let lastY = 0;
        let rotationX = 0;
        let rotationY = 0;

        canvas.addEventListener('mousedown', (e) => {
            isDragging = true;
            lastX = e.clientX;
            lastY = e.clientY;
        });

        document.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            const dx = e.clientX - lastX;
            const dy = e.clientY - lastY;
            rotationY += dx * 0.01;
            rotationX += dy * 0.01;
            lastX = e.clientX;
            lastY = e.clientY;
        });

        document.addEventListener('mouseup', () => {
            isDragging = false;
        });

        // Touch support
        canvas.addEventListener('touchstart', (e) => {
            isDragging = true;
            lastX = e.touches[0].clientX;
            lastY = e.touches[0].clientY;
        });

        document.addEventListener('touchmove', (e) => {
            if (!isDragging) return;
            const dx = e.touches[0].clientX - lastX;
            const dy = e.touches[0].clientY - lastY;
            rotationY += dx * 0.01;
            rotationX += dy * 0.01;
            lastX = e.touches[0].clientX;
            lastY = e.touches[0].clientY;
        });

        document.addEventListener('touchend', () => {
            isDragging = false;
        });

        // Animation loop
        function animate() {
            requestAnimationFrame(animate);
            globe.rotation.x = rotationX;
            globe.rotation.y = rotationY;
            renderer.render(scene, camera);
        }
        animate();

        // Handle window resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
