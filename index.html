<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blank</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000000;
            min-height: 100vh;
            overflow-x: hidden;
        }

        #stars {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 1;
        }
    </style>
</head>
<body>
    <svg id="stars" xmlns="http://www.w3.org/2000/svg"></svg>
    <script>
        const svg = document.getElementById('stars');
        const w = window.innerWidth, h = window.innerHeight;
        svg.setAttribute('viewBox', `0 0 ${w} ${h}`);
        for (let i = 0; i < 200; i++) {
            const x = Math.random() * w;
            const y = Math.random() * h;
            const r = Math.random() * 1.2 + 0.3;
            const op = (Math.random() * 0.6 + 0.3).toFixed(2);
            const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
            circle.setAttribute('cx', x);
            circle.setAttribute('cy', y);
            circle.setAttribute('r', r);
            circle.setAttribute('fill', 'white');
            circle.setAttribute('opacity', op);
            svg.appendChild(circle);
        }
    </script>
    <div class="container" style="padding: 20px; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh;">
        <h1 style="color: #ff69b4; margin-bottom: 40px;">Hello World</h1>
        <svg width="300" height="300" viewBox="0 0 300 300" style="filter: drop-shadow(0 0 20px rgba(255, 105, 180, 0.3));">
            <!-- Stars background -->
            <circle cx="30" cy="40" r="1" fill="white" opacity="0.8"/>
            <circle cx="70" cy="30" r="0.8" fill="white" opacity="0.6"/>
            <circle cx="120" cy="25" r="1.2" fill="white" opacity="0.9"/>
            <circle cx="180" cy="35" r="0.9" fill="white" opacity="0.7"/>
            <circle cx="250" cy="50" r="1" fill="white" opacity="0.8"/>
            <circle cx="45" cy="80" r="0.7" fill="white" opacity="0.5"/>
            <circle cx="280" cy="100" r="0.9" fill="white" opacity="0.7"/>
            <circle cx="25" cy="120" r="1.1" fill="white" opacity="0.8"/>
            <circle cx="260" cy="180" r="0.8" fill="white" opacity="0.6"/>
            <circle cx="40" cy="200" r="1" fill="white" opacity="0.8"/>
            <circle cx="270" cy="250" r="0.9" fill="white" opacity="0.7"/>
            <circle cx="80" cy="270" r="1.2" fill="white" opacity="0.9"/>
            <circle cx="150" cy="280" r="0.7" fill="white" opacity="0.5"/>
            <circle cx="220" cy="265" r="1" fill="white" opacity="0.8"/>

            <!-- Ocean -->
            <circle cx="150" cy="150" r="140" fill="#1e90ff"/>

            <!-- Continents -->
            <!-- North America - larger -->
            <path d="M 65 85 L 75 75 L 95 78 L 115 90 L 118 108 L 110 125 L 95 130 L 78 122 L 68 108 Z" fill="#2ecc71"/>
            <!-- North America - Greenland -->
            <path d="M 85 65 L 100 60 L 108 70 L 100 78 L 88 75 Z" fill="#2ecc71"/>

            <!-- South America - larger -->
            <path d="M 90 138 L 108 130 L 120 138 L 122 158 L 115 175 L 102 178 L 90 165 L 85 150 Z" fill="#2ecc71"/>

            <!-- Europe - larger -->
            <path d="M 138 82 L 158 78 L 172 85 L 175 100 L 165 112 L 148 115 L 138 105 Z" fill="#2ecc71"/>
            <!-- Scandinavia -->
            <path d="M 150 65 L 160 60 L 168 70 L 162 80 L 152 78 Z" fill="#2ecc71"/>

            <!-- Africa - larger -->
            <path d="M 148 118 L 185 112 L 192 140 L 190 168 L 175 185 L 158 182 L 148 162 L 145 138 Z" fill="#2ecc71"/>

            <!-- Asia - larger, more detailed -->
            <path d="M 178 72 L 225 65 L 245 80 L 248 110 L 238 132 L 210 142 L 188 138 L 178 118 L 175 92 Z" fill="#2ecc71"/>
            <!-- India -->
            <path d="M 200 138 L 212 135 L 215 158 L 205 165 L 198 155 Z" fill="#2ecc71"/>
            <!-- Southeast Asia -->
            <path d="M 228 138 L 242 132 L 248 148 L 238 155 L 228 148 Z" fill="#2ecc71"/>

            <!-- Australia - larger -->
            <path d="M 208 158 L 232 152 L 242 162 L 238 185 L 220 190 L 208 180 Z" fill="#2ecc71"/>
            <!-- New Zealand -->
            <path d="M 248 178 L 254 172 L 258 182 L 252 188 Z" fill="#2ecc71"/>

            <!-- Antarctica hint -->
            <path d="M 100 258 L 130 252 L 170 250 L 200 252 L 220 258 L 200 268 L 170 270 L 130 268 Z" fill="#e8e8e8" opacity="0.6"/>

            <!-- Clouds/Atmosphere glow -->
            <circle cx="150" cy="150" r="145" fill="none" stroke="rgba(255, 255, 255, 0.1)" stroke-width="2"/>
            <circle cx="150" cy="150" r="148" fill="none" stroke="rgba(255, 255, 255, 0.05)" stroke-width="3"/>
        </svg>
    </div>
</body>
</html>
