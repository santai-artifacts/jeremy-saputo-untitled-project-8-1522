<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snake</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            text-align: center;
        }

        h1 {
            color: #000000;
            margin-bottom: 30px;
            font-size: 2.5rem;
            text-shadow: 0 0 20px rgba(0, 212, 255, 0.3);
            letter-spacing: 2px;
        }

        .game-wrapper {
            display: flex;
            gap: 30px;
            align-items: flex-start;
            justify-content: center;
            flex-wrap: wrap;
        }

        #gameContainer {
            border: 3px solid #000000;
            background: #0f3460;
            box-shadow: 0 0 30px rgba(0, 212, 255, 0.2);
            image-rendering: pixelated;
        }

        .stats {
            display: flex;
            flex-direction: column;
            gap: 20px;
            color: #fff;
        }

        .stat-box {
            background: rgba(0, 212, 255, 0.1);
            border: 2px solid #000000;
            border-radius: 8px;
            padding: 20px;
            min-width: 180px;
        }

        .stat-label {
            font-size: 0.9rem;
            color: #000000;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
            opacity: 0.8;
        }

        .stat-value {
            font-size: 2.5rem;
            font-weight: bold;
            color: #00ff88;
            text-shadow: 0 0 10px rgba(0, 255, 136, 0.3);
        }

        .controls {
            margin-top: 30px;
            padding: 20px;
            background: rgba(0, 212, 255, 0.1);
            border: 2px solid #000000;
            border-radius: 8px;
            color: #fff;
        }

        .controls h3 {
            color: #000000;
            margin-bottom: 15px;
            font-size: 1.1rem;
        }

        .control-item {
            margin: 8px 0;
            font-size: 0.95rem;
        }

        .key {
            background: rgba(0, 212, 255, 0.2);
            padding: 4px 10px;
            border-radius: 4px;
            font-weight: bold;
            color: #00ff88;
            display: inline-block;
            min-width: 40px;
            margin-right: 8px;
        }

        .game-over {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.95);
            padding: 40px;
            border-radius: 12px;
            z-index: 100;
            text-align: center;
            color: #fff;
            border: 3px solid #ff4444;
            display: none;
            min-width: 300px;
        }

        .game-over h2 {
            color: #ff4444;
            font-size: 2rem;
            margin-bottom: 20px;
        }

        .game-over p {
            font-size: 1.2rem;
            color: #000000;
            margin-bottom: 15px;
        }

        .game-over button {
            background: linear-gradient(135deg, #000000, #00ff88);
            color: #000;
            border: none;
            padding: 12px 30px;
            font-size: 1rem;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .game-over button:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.5);
        }

        .game-wrapper-inner {
            position: relative;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 1.8rem;
                margin-bottom: 20px;
            }

            .game-wrapper {
                gap: 20px;
            }

            .stat-box {
                min-width: 140px;
                padding: 15px;
            }

            .stat-value {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🐍 SNAKE</h1>
        <div class="game-wrapper">
            <div class="game-wrapper-inner">
                <canvas id="gameContainer"></canvas>
                <div class="game-over" id="gameOverScreen">
                    <h2>Game Over!</h2>
                    <p>Final Score: <span id="finalScore">0</span></p>
                    <button onclick="location.reload()">Play Again</button>
                </div>
            </div>
            <div class="stats">
                <div class="stat-box">
                    <div class="stat-label">Score</div>
                    <div class="stat-value" id="score">0</div>
                </div>
                <div class="stat-box">
                    <div class="stat-label">Level</div>
                    <div class="stat-value" id="level">1</div>
                </div>
                <div class="controls">
                    <h3>Controls</h3>
                    <div class="control-item"><span class="key">↑</span> Up</div>
                    <div class="control-item"><span class="key">↓</span> Down</div>
                    <div class="control-item"><span class="key">←</span> Left</div>
                    <div class="control-item"><span class="key">→</span> Right</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameContainer');
        const ctx = canvas.getContext('2d');

        const gridSize = 20;
        const tileCount = 20;
        canvas.width = gridSize * tileCount;
        canvas.height = gridSize * tileCount;

        // Game state
        let snake = [
            { x: 10, y: 10 }
        ];
        let food = { x: 15, y: 15 };
        let direction = { x: 1, y: 0 };
        let nextDirection = { x: 1, y: 0 };
        let score = 0;
        let level = 1;
        let gameRunning = true;
        let gameSpeed = 100; // ms per move

        // Spawn food at random location
        function spawnFood() {
            let newFood;
            let onSnake = true;
            while (onSnake) {
                newFood = {
                    x: Math.floor(Math.random() * tileCount),
                    y: Math.floor(Math.random() * tileCount)
                };
                onSnake = snake.some(segment => segment.x === newFood.x && segment.y === newFood.y);
            }
            food = newFood;
        }

        // Handle keyboard input
        document.addEventListener('keydown', (e) => {
            if (!gameRunning) return;

            switch (e.key) {
                case 'ArrowUp':
                    if (direction.y === 0) nextDirection = { x: 0, y: -1 };
                    e.preventDefault();
                    break;
                case 'ArrowDown':
                    if (direction.y === 0) nextDirection = { x: 0, y: 1 };
                    e.preventDefault();
                    break;
                case 'ArrowLeft':
                    if (direction.x === 0) nextDirection = { x: -1, y: 0 };
                    e.preventDefault();
                    break;
                case 'ArrowRight':
                    if (direction.x === 0) nextDirection = { x: 1, y: 0 };
                    e.preventDefault();
                    break;
            }
        });

        function update() {
            if (!gameRunning) return;

            direction = nextDirection;

            // Calculate new head position
            const head = snake[0];
            const newHead = {
                x: (head.x + direction.x + tileCount) % tileCount,
                y: (head.y + direction.y + tileCount) % tileCount
            };

            // Check self collision
            if (snake.some(segment => segment.x === newHead.x && segment.y === newHead.y)) {
                endGame();
                return;
            }

            snake.unshift(newHead);

            // Check food collision
            if (newHead.x === food.x && newHead.y === food.y) {
                score += 10;
                level = Math.floor(score / 100) + 1;
                gameSpeed = Math.max(50, 100 - (level - 1) * 5);
                spawnFood();
                document.getElementById('score').textContent = score;
                document.getElementById('level').textContent = level;
            } else {
                snake.pop();
            }
        }

        function draw() {
            // Clear canvas
            ctx.fillStyle = '#fffacd';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw grid
            ctx.strokeStyle = 'rgba(0, 0, 0, 0.15)';
            ctx.lineWidth = 0.5;
            for (let i = 0; i <= tileCount; i++) {
                ctx.beginPath();
                ctx.moveTo(i * gridSize, 0);
                ctx.lineTo(i * gridSize, canvas.height);
                ctx.stroke();

                ctx.beginPath();
                ctx.moveTo(0, i * gridSize);
                ctx.lineTo(canvas.width, i * gridSize);
                ctx.stroke();
            }

            // Draw snake
            snake.forEach((segment, index) => {
                if (index === 0) {
                    // Head
                    ctx.fillStyle = '#ff1493';
                    ctx.shadowColor = 'rgba(255, 20, 147, 0.5)';
                    ctx.shadowBlur = 10;
                } else {
                    // Body
                    ctx.fillStyle = '#ff69b4';
                    ctx.shadowColor = 'rgba(255, 105, 180, 0.3)';
                    ctx.shadowBlur = 5;
                }

                const x = segment.x * gridSize + 1;
                const y = segment.y * gridSize + 1;
                const size = gridSize - 2;

                ctx.beginPath();
                ctx.roundRect(x, y, size, size, 3);
                ctx.fill();
            });

            ctx.shadowColor = 'transparent';

            // Draw food
            ctx.fillStyle = '#ff6b6b';
            ctx.shadowColor = 'rgba(255, 107, 107, 0.5)';
            ctx.shadowBlur = 10;
            const foodX = food.x * gridSize + 2;
            const foodY = food.y * gridSize + 2;
            const foodSize = gridSize - 4;
            ctx.beginPath();
            ctx.roundRect(foodX, foodY, foodSize, foodSize, 3);
            ctx.fill();
            ctx.shadowColor = 'transparent';
        }

        function endGame() {
            gameRunning = false;
            document.getElementById('finalScore').textContent = score;
            document.getElementById('gameOverScreen').style.display = 'block';
        }

        function gameLoop() {
            update();
            draw();
            setTimeout(gameLoop, gameSpeed);
        }

        // Start the game
        spawnFood();
        gameLoop();
    </script>
</body>
</html>
