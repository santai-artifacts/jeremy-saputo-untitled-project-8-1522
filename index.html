<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blank</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000000;
            min-height: 100vh;
            overflow: hidden;
        }

        #stars {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 1;
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            perspective: 1200px;
        }

        h1 {
            color: #ff69b4;
            margin-bottom: 40px;
            position: absolute;
            top: 40px;
        }

        #earthContainer {
            cursor: grab;
            width: 400px;
            height: 400px;
            position: relative;
            transform-style: preserve-3d;
        }

        #earthContainer:active {
            cursor: grabbing;
        }

        #earth {
            width: 100%;
            height: 100%;
            filter: drop-shadow(0 0 40px rgba(255, 105, 180, 0.4));
            transform-style: preserve-3d;
        }

        .controls {
            color: #ff69b4;
            margin-top: 60px;
            text-align: center;
            font-size: 14px;
            position: absolute;
            bottom: 40px;
        }
    </style>
</head>
<body>
    <svg id="stars" xmlns="http://www.w3.org/2000/svg"></svg>
    <script>
        const svg = document.getElementById('stars');
        const w = window.innerWidth, h = window.innerHeight;
        svg.setAttribute('viewBox', `0 0 ${w} ${h}`);
        for (let i = 0; i < 200; i++) {
            const x = Math.random() * w;
            const y = Math.random() * h;
            const r = Math.random() * 1.2 + 0.3;
            const op = (Math.random() * 0.6 + 0.3).toFixed(2);
            const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
            circle.setAttribute('cx', x);
            circle.setAttribute('cy', y);
            circle.setAttribute('r', r);
            circle.setAttribute('fill', 'white');
            circle.setAttribute('opacity', op);
            svg.appendChild(circle);
        }
    </script>
    <div class="container">
        <h1>Hello World</h1>
        <div id="earthContainer">
            <svg id="earth" viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg">
                <!-- Ocean -->
                <circle cx="150" cy="150" r="140" fill="#1e90ff"/>

                <!-- Front side continents -->
                <!-- North America - larger -->
                <path d="M 65 85 L 75 75 L 95 78 L 115 90 L 118 108 L 110 125 L 95 130 L 78 122 L 68 108 Z" fill="#2ecc71"/>
                <!-- North America - Greenland -->
                <path d="M 85 65 L 100 60 L 108 70 L 100 78 L 88 75 Z" fill="#2ecc71"/>

                <!-- South America - larger -->
                <path d="M 90 138 L 108 130 L 120 138 L 122 158 L 115 175 L 102 178 L 90 165 L 85 150 Z" fill="#2ecc71"/>

                <!-- Europe - larger -->
                <path d="M 138 82 L 158 78 L 172 85 L 175 100 L 165 112 L 148 115 L 138 105 Z" fill="#2ecc71"/>
                <!-- Scandinavia -->
                <path d="M 150 65 L 160 60 L 168 70 L 162 80 L 152 78 Z" fill="#2ecc71"/>

                <!-- Africa - larger -->
                <path d="M 148 118 L 185 112 L 192 140 L 190 168 L 175 185 L 158 182 L 148 162 L 145 138 Z" fill="#2ecc71"/>

                <!-- Back side continents (Pacific side, offset by ~180 degrees) -->
                <!-- Japan -->
                <path d="M 245 100 L 260 95 L 265 115 L 252 120 Z" fill="#2ecc71"/>
                <!-- Eastern Russia -->
                <path d="M 235 78 L 255 72 L 265 85 L 248 92 Z" fill="#2ecc71"/>
                <!-- Pacific islands suggestion -->
                <path d="M 270 140 L 280 138 L 282 152 L 272 155 Z" fill="#2ecc71"/>

                <!-- Atmosphere glow -->
                <circle cx="150" cy="150" r="145" fill="none" stroke="rgba(255, 255, 255, 0.1)" stroke-width="2"/>
                <circle cx="150" cy="150" r="148" fill="none" stroke="rgba(255, 255, 255, 0.05)" stroke-width="3"/>
            </svg>
        </div>
        <div class="controls">
            <p>Drag left/right to spin • Drag up/down to tilt</p>
        </div>
    </div>

    <script>
        const container = document.getElementById('earthContainer');
        const earth = document.getElementById('earth');
        let rotationX = 0;
        let rotationY = 0;
        let isDragging = false;
        let lastX = 0;
        let lastY = 0;

        // Mouse drag
        container.addEventListener('mousedown', (e) => {
            isDragging = true;
            lastX = e.clientX;
            lastY = e.clientY;
        });

        document.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            const dx = e.clientX - lastX;
            const dy = e.clientY - lastY;
            rotationY += dx * 0.8;
            rotationX -= dy * 0.8;
            lastX = e.clientX;
            lastY = e.clientY;
            updateRotation();
        });

        document.addEventListener('mouseup', () => {
            isDragging = false;
        });

        // Touch drag
        container.addEventListener('touchstart', (e) => {
            isDragging = true;
            lastX = e.touches[0].clientX;
            lastY = e.touches[0].clientY;
        });

        document.addEventListener('touchmove', (e) => {
            if (!isDragging) return;
            const dx = e.touches[0].clientX - lastX;
            const dy = e.touches[0].clientY - lastY;
            rotationY += dx * 0.8;
            rotationX -= dy * 0.8;
            lastX = e.touches[0].clientX;
            lastY = e.touches[0].clientY;
            updateRotation();
        });

        document.addEventListener('touchend', () => {
            isDragging = false;
        });

        // Arrow keys
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft') rotationY += 15;
            if (e.key === 'ArrowRight') rotationY -= 15;
            if (e.key === 'ArrowUp') rotationX += 15;
            if (e.key === 'ArrowDown') rotationX -= 15;
            updateRotation();
        });

        function updateRotation() {
            // Clamp vertical rotation to avoid over-tilting
            rotationX = Math.max(-85, Math.min(85, rotationX));
            earth.style.transform = `rotateX(${rotationX}deg) rotateY(${rotationY}deg)`;
        }
    </script>
</body>
</html>
